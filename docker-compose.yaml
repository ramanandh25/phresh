services:
  server:
    image: phresh-api-server:0.1.1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./backend/:/app/backend/
    command: uvicorn backend.app.api.server:app --reload --workers 1 --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    ports:
      - 8000:8000

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15.3-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
    ports:
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    
 
volumes:
  postgres_data:

name: phresh-cleaning
